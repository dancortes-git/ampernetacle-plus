{{- if .Values.db.passwordSecret.create }}
{{- $secretName := .Values.db.passwordSecret.name -}}
{{- $secretKey := .Values.db.passwordSecret.key -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName | quote }}
  labels:
    {{- include "n8n-db-init.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existingSecret (hasKey $existingSecret.data $secretKey) }}
  {{ $secretKey }}: {{ index $existingSecret.data $secretKey | quote }}
  {{- else }}
  {{ $secretKey }}: {{ randAlphaNum (.Values.db.passwordSecret.length | int) | b64enc | quote }}
  {{- end }}
{{- end }}
