# Template rendered by Terraform with templatefile().
# The n8n chart creates the PVC automatically from this persistence block.
main:
  persistence:
    enabled: true
    storageClass: ${jsonencode(storage_class_name)}
    size: ${jsonencode(persistence_size)}
    accessMode: ReadWriteOnce
    annotations:
      helm.sh/resource-policy: null
  extraEnvVars:
    N8N_HOST: ${jsonencode(n8n_host)}
    N8N_PROTOCOL: ${jsonencode(n8n_protocol)}
    WEBHOOK_URL: ${jsonencode(webhook_url)}
    N8N_EDITOR_BASE_URL: ${jsonencode(webhook_url)}
    N8N_PROXY_HOPS: "1"
    N8N_RUNNERS_MODE: "external"
    N8N_RUNNERS_BROKER_LISTEN_ADDRESS: "0.0.0.0"
    N8N_RUNNERS_BROKER_PORT: "5679"
    N8N_NATIVE_PYTHON_RUNNER: "true"
    N8N_EMAIL_MODE: "smtp"
    N8N_SMTP_HOST: ${jsonencode(smtp_host)}
    N8N_SMTP_PORT: "587"
    N8N_SMTP_USER: ${jsonencode(smtp_user)}
    N8N_SMTP_SENDER: ${jsonencode(smtp_sender)}
    N8N_SMTP_SSL: "false"
  extraSecretNamesForEnvFrom:
    - n8n-runner-auth
    - ${jsonencode(smtp_secret_name)}

worker:
  extraEnvVars:
    N8N_HOST: ${jsonencode(n8n_host)}
    N8N_PROTOCOL: ${jsonencode(n8n_protocol)}
    WEBHOOK_URL: ${jsonencode(webhook_url)}
    N8N_PROXY_HOPS: "1"

webhook:
  url: ${jsonencode(webhook_url)}
  extraEnvVars:
    N8N_HOST: ${jsonencode(n8n_host)}
    N8N_PROTOCOL: ${jsonencode(n8n_protocol)}
    WEBHOOK_URL: ${jsonencode(webhook_url)}
    N8N_PROXY_HOPS: "1"

db:
  type: postgresdb

externalPostgresql:
  host: ${jsonencode(db_host)}
  port: ${db_port}
  database: ${jsonencode(db_database)}
  username: ${jsonencode(db_user)}
  existingSecret: ${jsonencode(db_password_secret_name)}

# The chart uses this field to select the password key when an external
# PostgreSQL Secret is configured. PostgreSQL remains disabled below.
postgresql:
  enabled: false
  auth:
    username: ${jsonencode(db_user)}

ingress:
  enabled: true
  className: ${jsonencode(ingress_class_name)}
  annotations:
    cert-manager.io/cluster-issuer: ${jsonencode(cert_manager_cluster_issuer)}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: ${jsonencode(n8n_host)}
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: n8n-tls
      hosts:
        - ${jsonencode(n8n_host)}
